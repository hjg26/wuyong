<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线工具与有趣网站合集 · 150+精选</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --sidebar-bg: #1a1d23;
            --sidebar-hover: #2a2d35;
            --sidebar-active: #333840;
            --accent: #4f8ff7;
            --accent-light: #e8f0fe;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --card-bg: #fff;
            --border: #e5e7eb;
            --shadow: 0 1px 3px rgba(0,0,0,.08);
            --shadow-hover: 0 4px 16px rgba(0,0,0,.12);
            --radius: 8px;
            --tag-bg: #f3f4f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: 260px;
            height: 100vh;
            background: var(--sidebar-bg);
            color: #c9cdd4;
            display: flex;
            flex-direction: column;
            z-index: 100;
            overflow: hidden;
            transition: transform .25s ease;
        }

        .sidebar-header {
            padding: 20px 16px 12px;
            border-bottom: 1px solid rgba(255,255,255,.08);
            flex-shrink: 0;
        }
        .sidebar-header h2 {
            font-size: 16px;
            color: #fff;
            letter-spacing: .5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sidebar-header .count {
            font-size: 12px;
            background: var(--accent);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .tree-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,.15) transparent;
        }
        .tree-wrapper::-webkit-scrollbar { width: 5px; }
        .tree-wrapper::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }

        /* TREE NODES */
        .tree-node { user-select: none; }
        .tree-label {
            display: flex;
            align-items: center;
            padding: 7px 16px 7px 0;
            cursor: pointer;
            transition: background .15s;
            gap: 4px;
            font-size: 13.5px;
            position: relative;
        }
        .tree-label:hover { background: var(--sidebar-hover); }
        .tree-label.active { background: var(--sidebar-active); color: #fff; border-right: 2px solid var(--accent); }
        .tree-label .arrow {
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: transform .2s;
            font-size: 10px;
            opacity: .6;
        }
        .tree-label .arrow.expanded { transform: rotate(90deg); }
        .tree-label .arrow.hidden { visibility: hidden; }
        .tree-label .node-icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
        .tree-label .node-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tree-label .badge {
            font-size: 11px;
            background: rgba(255,255,255,.1);
            padding: 1px 7px;
            border-radius: 8px;
            flex-shrink: 0;
            min-width: 28px;
            text-align: center;
        }
        .tree-children { overflow: hidden; transition: max-height .3s ease; }
        .tree-children.collapsed { max-height: 0 !important; }
        .tree-label.tree-leaf {
            color: #a0a7b3;
            font-size: 12.5px;
            text-decoration: none;
            padding-top: 6px;
            padding-bottom: 6px;
            flex-wrap: wrap;
        }
        .tree-label.tree-leaf:hover { background: var(--sidebar-hover); color: #fff; }
        .tree-label.tree-leaf .node-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 100%;
        }
        .tree-leaf-desc {
            font-size: 10.5px;
            color: #5a6070;
            margin-top: 1px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 170px;
            width: 100%;
            line-height: 1.4;
        }
        .tree-label.tree-leaf:hover .tree-leaf-desc { color: #9ca3af; }

        /* ========== MAIN ========== */
        .main {
            margin-left: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .top-bar {
            position: sticky; top: 0;
            background: rgba(240,242,245,.85);
            backdrop-filter: blur(12px);
            padding: 16px 24px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        .search-wrap {
            flex: 1;
            position: relative;
            max-width: 520px;
        }
        .search-wrap svg {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            width: 18px; height: 18px;
            color: #9ca3af;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 10px 16px 10px 42px;
            border: 1.5px solid var(--border);
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            background: #fff;
            transition: border-color .2s, box-shadow .2s;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79,143,247,.15);
        }
        .search-clear {
            position: absolute;
            right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            font-size: 16px; cursor: pointer;
            color: #9ca3af;
            display: none;
            line-height: 1;
        }

        .result-info {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .menu-toggle {
            display: none;
            background: none; border: none;
            font-size: 22px; cursor: pointer;
            padding: 4px;
            color: var(--text);
        }

        /* ========== CONTENT AREA ========== */
        .content {
            flex: 1;
            padding: 20px 24px 40px;
            overflow-y: auto;
        }

        .category-section { margin-bottom: 32px; }
        .category-title {
            font-size: 17px;
            font-weight: 600;
            padding: 6px 0 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }
        .category-title .cat-count {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .sub-category-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            padding: 4px 0 10px;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 12px 14px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: box-shadow .2s, transform .15s;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            text-decoration: none;
            color: inherit;
        }
        .card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-1px);
            border-color: var(--accent);
        }
        .card-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-name .ext-icon {
            font-size: 11px;
            opacity: .4;
            transition: opacity .2s;
        }
        .card:hover .ext-icon { opacity: .8; }
        .card-desc {
            font-size: 12.5px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-url {
            font-size: 11px;
            color: #9ca3af;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: "SF Mono", "Consolas", monospace;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        /* ========== CARD HIGHLIGHT ANIMATION ========== */
        .card-highlight {
            animation: cardPulse 0.9s ease-out forwards;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 5px rgba(79,143,247,.35), 0 12px 36px rgba(0,0,0,.18) !important;
            z-index: 10;
            position: relative;
        }
        @keyframes cardPulse {
            0%   { transform: scale(1);   box-shadow: var(--shadow); }
            35%  { transform: scale(1.07); box-shadow: 0 0 0 12px rgba(79,143,247,.2), 0 20px 48px rgba(0,0,0,.25); }
            60%  { transform: scale(0.97); }
            100% { transform: scale(1.04); box-shadow: 0 0 0 5px rgba(79,143,247,.35), 0 12px 36px rgba(0,0,0,.18); }
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,.4);
            z-index: 99;
        }

        /* responsive */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.show { display: block; }
            .main { margin-left: 0; }
            .menu-toggle { display: block; }
            .card-grid { grid-template-columns: 1fr; }
            .content { padding: 16px 12px 32px; }
            .top-bar { padding: 12px 16px; }
        }

        /* ========== WISH MODULE ========== */
        .wish-fab {
            position: fixed;
            bottom: 28px; right: 28px;
            width: 50px; height: 50px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 22px;
            box-shadow: 0 4px 14px rgba(79,143,247,.4);
            z-index: 200;
            transition: transform .2s, box-shadow .2s;
            display: flex; align-items: center; justify-content: center;
        }
        .wish-fab:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(79,143,247,.5); }
        .wish-panel {
            position: fixed;
            bottom: 90px; right: 28px;
            width: 340px; max-height: 420px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,.15);
            z-index: 200;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .wish-panel.show { display: flex; }
        .wish-panel-header {
            padding: 14px 16px;
            background: var(--sidebar-bg);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .wish-sync {
            font-size: 11px;
            font-weight: 400;
            opacity: .7;
            color: #9ca3af;
            padding: 2px 0;
        }
        .wish-sync.success { color: #4ade80; }
        .wish-sync.error { color: #f87171; }
        .wish-panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            min-height: 60px;
            max-height: 260px;
        }
        .wish-empty {
            text-align: center;
            padding: 24px 16px;
            color: #9ca3af;
            font-size: 13px;
        }
        .wish-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            background: var(--tag-bg);
            margin-bottom: 6px;
            font-size: 13px;
        }
        .wish-item .wish-text { flex: 1; word-break: break-all; line-height: 1.5; }
        .wish-item .wish-time { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .wish-item .wish-no { color: var(--accent); font-weight: 600; margin-right: 2px; }
        .wish-del { 
            background: none; border: none; color: #9ca3af; cursor: pointer;
            font-size: 14px; padding: 2px 6px; border-radius: 4px;
            flex-shrink: 0; transition: color .2s, background .2s;
        }
        .wish-del:hover { color: #ef4444; background: rgba(239,68,68,.1); }
        .wish-panel-footer {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .wish-input {
            flex: 1;
            padding: 8px 12px;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            outline: none;
            transition: border-color .2s;
        }
        .wish-input:focus { border-color: var(--accent); }
        .wish-submit {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            transition: background .2s;
            flex-shrink: 0;
        }
        .wish-submit:hover { background: #3b7de6; }
        .wish-clear {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 12px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .wish-clear:hover { background: rgba(239,68,68,.1); }

        @media (max-width: 768px) {
            .wish-panel { width: calc(100vw - 32px); right: 16px; left: 16px; bottom: 82px; }
            .wish-fab { right: 16px; bottom: 20px; }
        }

        /* ========== PROXY VIEW ========== */
        html.proxy-mode, html.proxy-mode body { height:100%; overflow:hidden; }
        html.proxy-mode .sidebar { display:none !important; }
        html.proxy-mode .main { display:none !important; }
        html.proxy-mode .wish-fab { display:none !important; }
        html.proxy-mode .wish-panel { display:none !important; }
        html.proxy-mode .sidebar-overlay { display:none !important; }
        html:not(.proxy-mode) #proxyView { display:none !important; }

        #proxyView {
            position:fixed; top:0; left:0; width:100%; height:100%;
            z-index:9999; background:#fff;
            display:flex; flex-direction:column;
        }
        #proxyBar {
            display:flex; align-items:center; padding:0 16px;
            background:#1a1d23; color:#fff; gap:12px;
            height:48px; flex-shrink:0;
        }
        #proxyBack {
            background:rgba(255,255,255,.12); border:none; color:#fff;
            padding:6px 14px; border-radius:6px; cursor:pointer;
            font-size:14px; flex-shrink:0;
            transition:background .2s;
        }
        #proxyBack:hover { background:rgba(255,255,255,.22); }
        #proxyTitle {
            font-size:14px; font-weight:600; white-space:nowrap;
            overflow:hidden; text-overflow:ellipsis;
        }
        #proxyDesc {
            font-size:12px; color:#9ca3af; flex:1;
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
        }
        #proxyLoading {
            display:flex; align-items:center; justify-content:center;
            flex:1; font-size:13px; color:#9ca3af;
        }
        #proxyLoader {
            width:20px; height:20px; border:2px solid #e5e7eb;
            border-top-color:var(--accent); border-radius:50%;
            animation:spin .7s linear infinite; margin-right:8px;
        }
        @keyframes spin { to{transform:rotate(360deg)} }
        #proxyFrame {
            width:100%; flex:1; border:none;
        }
        #proxyFallback {
            display:none; flex:1; align-items:center; justify-content:center;
            flex-direction:column; gap:16px; text-align:center;
        }
        #proxyFallback.show { display:flex; }
        #proxyFallback p { color:var(--text-secondary); font-size:14px; }
        #proxyDirect {
            display:inline-block; background:var(--accent); color:#fff;
            padding:10px 24px; border-radius:8px; text-decoration:none;
            font-size:14px; font-weight:600; cursor:pointer;
        }
        #proxyDirect:hover { background:#3b7de6; }
    </style>
</head>
<body>
<script>(function(){var m=window.location.pathname.match(/^\/(\d+)$/);if(m){document.documentElement.classList.add('proxy-mode');window.__proxyIdx=parseInt(m[1]);window.__onProxy=!0}})();</script>

<div class="sidebar-overlay" id="overlay"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h2>📑 目录导航 <span class="count" id="totalCount">150</span></h2>
    </div>
    <div class="tree-wrapper" id="treeContainer"></div>
</aside>

<div class="main">
    <div class="top-bar">
        <button class="menu-toggle" title="菜单">☰</button>
        <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索网站名称、简介...">
            <button class="search-clear" id="searchClear">✕</button>
        </div>
        <span class="result-info" id="resultInfo"></span>
    </div>
    <div class="content" id="contentArea"></div>
</div>

<!-- WISH MODULE -->
<button class="wish-fab" id="wishFab" title="我想要...">💡</button>
<div class="wish-panel" id="wishPanel">
    <div class="wish-panel-header">
        <span>📋 我想要...</span>
        <button class="wish-clear" id="wishClearAll" title="清空所有记录">清空</button>
    </div>
    <div class="wish-panel-body" id="wishListBox">
        <div class="wish-empty">暂无记录，在下方输入你想要的工具/功能</div>
    </div>
    <div class="wish-panel-footer">
        <input type="text" class="wish-input" id="wishInput" placeholder="输入你想要的工具或功能..." maxlength="500">
        <button class="wish-submit" id="wishSubmit">提交</button>
    </div>
    <div class="wish-sync" id="wishSync">连接中...</div>
</div>

<!-- PROXY VIEW -->
<div id="proxyView">
    <div id="proxyBar">
        <button id="proxyBack" onclick="location.href='/'">← 返回目录</button>
        <span id="proxyTitle">加载中...</span>
        <span id="proxyDesc"></span>
    </div>
    <div id="proxyLoading">
        <div id="proxyLoader"></div>
        <span>正在加载网站...</span>
    </div>
    <iframe id="proxyFrame" allowfullscreen></iframe>
    <div id="proxyFallback">
        <p>⚠️ 该网站不允许被嵌入显示</p>
        <a id="proxyDirect" target="_blank" rel="noopener">在新标签页中打开</a>
    </div>
</div>

<script>if(!window.__onProxy){document.write('<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>')}</script>
<script src="guard.js"></script>
<script src="main.js"></script>
<script>if(!window.__onProxy){document.write('<script src="wish.js"><\/script>')}</script>
</body>
</html>
